<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>地图邻接校对工具</title>
<style>
  body { margin:0; font-family:system-ui,sans-serif; background:#22261d; color:#eee; display:flex; height:100vh; overflow:hidden; }
  #side { width:270px; padding:12px; background:#2d3226; overflow-y:auto; flex-shrink:0; }
  #main { flex:1; overflow:auto; position:relative; }
  #stage { position:relative; transform-origin:0 0; }
  #stage img { display:block; user-select:none; pointer-events:none; }
  svg { position:absolute; left:0; top:0; }
  h2 { font-size:16px; margin:4px 0 10px; }
  button { margin:3px 2px; padding:6px 10px; border:0; border-radius:6px; background:#5a7d4a; color:#fff; cursor:pointer; font-size:13px; }
  button:hover { background:#6f9a5b; }
  button.warn { background:#8a5a3a; }
  #info { font-size:13px; line-height:1.5; background:#22261d; border-radius:6px; padding:8px; margin-top:8px; min-height:120px; white-space:pre-wrap; }
  #stats { font-size:12px; color:#b9c4a5; margin-top:8px; white-space:pre-wrap; }
  .hint { font-size:12px; color:#b9c4a5; line-height:1.6; }
  line { stroke:#ff2222; stroke-width:2.5; cursor:pointer; }
  line:hover { stroke:#ffffff; stroke-width:4; }
  line.sel-adj { stroke:#00e5ff; }
  circle { cursor:grab; stroke:#111; stroke-width:1.5; }
  circle.selected { stroke:#00e5ff; stroke-width:4; }
  text { font-size:13px; font-weight:bold; fill:#fff; paint-order:stroke; stroke:#000; stroke-width:3px; pointer-events:none; user-select:none; }
  input[type=range]{ width:100%; }
</style>
</head>
<body>
<div id="side">
  <h2>邻接校对工具</h2>
  <div class="hint">
    · 单击选中区块（高亮其邻接边）<br>
    · 依次单击两个区块 = 添加/删除边<br>
    · 单击红线 = 删除该边<br>
    · 拖动圆点 = 移动节点位置<br>
    · Esc = 取消选择，Ctrl+Z = 撤销
  </div>
  缩放 <input type="range" id="zoom" min="0.5" max="3" step="0.1" value="1">
  <div>
    <button onclick="exportJSON()">导出 JSON</button>
    <button onclick="copyJSON()">复制 JSON</button>
    <button class="warn" onclick="resetData()">还原初始</button>
  </div>
  <div>
    <label style="font-size:12px"><input type="checkbox" id="showEdges" checked onchange="draw()"> 显示边</label>
    <label style="font-size:12px"><input type="checkbox" id="showLabels" checked onchange="draw()"> 显示编号</label>
  </div>
  <div id="info">未选中区块</div>
  <div id="stats"></div>
</div>

function snapshot(){ history.push(JSON.stringify(data)); if (history.length>100) history.shift(); }
function undo(){ if (history.length){ data = JSON.parse(history.pop()); selected=null; draw(); persist(); } }

function edgeKey(a,b){ return a<b ? a+'|'+b : b+'|'+a; }
function hasEdge(a,b){ return data.edges.some(e => edgeKey(e[0],e[1])===edgeKey(a,b)); }
function toggleEdge(a,b){
  snapshot();
  const k = edgeKey(a,b);
  const i = data.edges.findIndex(e => edgeKey(e[0],e[1])===k);
  if (i>=0) data.edges.splice(i,1); else data.edges.push([a,b,0]);
  syncNeighbors(); draw(); persist();
}
function syncNeighbors(){
  for (const n in data.zones) data.zones[n].neighbors = [];
  for (const [a,b] of data.edges){ data.zones[a].neighbors.push(b); data.zones[b].neighbors.push(a); }
}

function draw(){
  svg.innerHTML = '';
  const showE = document.getElementById('showEdges').checked;
  const showL = document.getElementById('showLabels').checked;
  if (showE) for (const [a,b] of data.edges){
    const za=data.zones[a], zb=data.zones[b];
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',za.x); l.setAttribute('y1',za.y);
    l.setAttribute('x2',zb.x); l.setAttribute('y2',zb.y);
    if (selected && (a===selected||b===selected)) l.classList.add('sel-adj');
    l.addEventListener('click', ev => { ev.stopPropagation(); snapshot();
      data.edges = data.edges.filter(e => edgeKey(e[0],e[1])!==edgeKey(a,b));
      syncNeighbors(); draw(); persist(); });
    svg.appendChild(l);
  }
  for (const n in data.zones){
    const z = data.zones[n];
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',z.x); c.setAttribute('cy',z.y); c.setAttribute('r',9);
    c.setAttribute('fill', LV_COLORS[z.level]||'#999');
    if (n===selected) c.classList.add('selected');
    c.addEventListener('mousedown', ev => startDrag(ev, n));
    c.addEventListener('click', ev => { ev.stopPropagation(); onNodeClick(n); });
    svg.appendChild(c);
    if (showL){
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', z.x+11); t.setAttribute('y', z.y+4);
      t.textContent = n; svg.appendChild(t);
    }
  }
  updateStats();
}

function onNodeClick(n){
  if (selected && selected!==n){ toggleEdge(selected,n); selected=null; }
  else selected = (selected===n ? null : n);
  showInfo(); draw();
}
function showInfo(){
  const el = document.getElementById('info');
  if (!selected){ el.textContent='未选中区块'; return; }
  const z = data.zones[selected];
  el.textContent = `区块 ${selected}（${z.level} 级）\n邻居 ${z.neighbors.length} 个：\n` + z.neighbors.sort().join(', ');
}
function updateStats(){
  const zs = Object.entries(data.zones);
  const degs = zs.map(([n,z])=>z.neighbors.length);
  const iso = zs.filter(([n,z])=>z.neighbors.length===0).map(([n])=>n);
  // connectivity
  const g = {}; zs.forEach(([n,z])=>g[n]=z.neighbors);
  const seen = new Set(); const st=['8-1'];
  while(st.length){ const u=st.pop(); if(seen.has(u))continue; seen.add(u); (g[u]||[]).forEach(v=>st.push(v)); }
  document.getElementById('stats').textContent =
    `区块 ${zs.length} | 边 ${data.edges.length}\n`+
    `与8-1连通: ${seen.size}/${zs.length}\n`+
    (iso.length?`孤立区块: ${iso.join(',')}\n`:'')+
    `平均邻居数 ${(degs.reduce((a,b)=>a+b,0)/degs.length).toFixed(1)}`;
}

// drag
let drag = null;
function startDrag(ev, n){
  ev.preventDefault();
  drag = { n, moved:false, sx:ev.clientX, sy:ev.clientY, ox:data.zones[n].x, oy:data.zones[n].y };
}
window.addEventListener('mousemove', ev => {
  if (!drag) return;
  const sc = parseFloat(document.getElementById('zoom').value);
  const dx = (ev.clientX-drag.sx)/sc, dy = (ev.clientY-drag.sy)/sc;
  if (Math.abs(dx)+Math.abs(dy) > 3) drag.moved = true;
  if (drag.moved){ data.zones[drag.n].x = drag.ox+dx; data.zones[drag.n].y = drag.oy+dy; draw(); }
});
window.addEventListener('mouseup', () => {
  if (drag && drag.moved){ persist(); setTimeout(()=>{},0); }
  if (drag && drag.moved) suppressClick = true;
  drag = null;
});
let suppressClick = false;
svg.addEventListener('click', ev => { if (suppressClick){ suppressClick=false; return; } selected=null; showInfo(); draw(); }, true);

document.getElementById('zoom').addEventListener('input', ev => {
  document.getElementById('stage').style.transform = `scale(${ev.target.value})`;
});
window.addEventListener('keydown', ev => {
  if (ev.key==='Escape'){ selected=null; showInfo(); draw(); }
  if ((ev.ctrlKey||ev.metaKey) && ev.key==='z'){ ev.preventDefault(); undo(); }
});

function exportJSON(){
  const blob = new Blob([JSON.stringify(data,null,1)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'map_data.json'; a.click();
}
function copyJSON(){ navigator.clipboard.writeText(JSON.stringify(data,null,1)).then(()=>alert('已复制')); }
function resetData(){ if(confirm('还原为初始识别结果？当前修改将丢失')){ data = JSON.parse(JSON.stringify(INITIAL)); selected=null; syncNeighbors(); draw(); persist(); } }

syncNeighbors(); draw();
</script>
